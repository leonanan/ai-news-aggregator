name: Aggregate Daily AI News

on:
  schedule:
    # 00:30 UTC = 08:30 Beijing time
    - cron: "30 0 * * *"
  workflow_dispatch: # Manual trigger for testing

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run aggregation
        run: npx tsx scripts/aggregate.ts
        timeout-minutes: 5

      - name: Commit and push
        run: |
          git config user.name "ai-news-bot"
          git config user.email "bot@ai-news.local"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No new articles today."
          else
            git commit -m "news: $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
